<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Yanmar Rental - Final iOS Fix</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#E60012">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #f8fafc; font-family: 'Kanit', sans-serif; }
        .safe-padding-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0.8; } to { opacity: 1; } }
        .btn-gradient { background-image: linear-gradient(to right, #EF4444, #F97316); }
        
        /* === iOS Fixes Start === */
        /* 1. Hide browser's default calendar icon */
        input[type="date"]::-webkit-calendar-picker-indicator { 
            display: none;
            -webkit-appearance: none;
        }

        /* 2. Custom Checkbox for cross-browser compatibility */
        .custom-checkbox {
            -webkit-appearance: none; /* Remove default iOS styling */
            appearance: none;
            background-color: #fff;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.25rem;
            height: 1.25rem;
            border: 0.15em solid #d1d5db; /* border-slate-300 */
            border-radius: 0.375rem; /* rounded-md */
            transform: translateY(-0.075em);
            display: grid;
            place-content: center;
            transition: 120ms transform ease-in-out;
        }

        .custom-checkbox::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em #EF4444; /* bg-red-500 */
            transform-origin: bottom left;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .custom-checkbox:checked {
            border-color: #EF4444; /* border-red-500 */
        }
        
        .custom-checkbox:checked::before {
            transform: scale(1);
        }
        /* === iOS Fixes End === */

    </style>
</head>
<body class="antialiased">

    <div id="app-container" class="max-w-md mx-auto h-screen bg-slate-50">
        
        <div id="page-login" class="flex flex-col items-center justify-center h-full p-8 bg-white"><img src="https://placehold.co/240x80/FAFAFA/CCCCCC?text=YOUR+LOGO" alt="Company Logo" class="mb-8"><h1 class="text-2xl font-bold text-slate-800">Yanmar Rental</h1><p class="text-slate-500 mb-8">เข้าสู่ระบบเพื่อเริ่มใช้งาน</p><div class="w-full space-y-4"><input type="text" placeholder="ชื่อผู้ใช้" class="w-full p-3 border border-slate-300 rounded-lg" value="yanmar_user"><input type="password" placeholder="รหัสผ่าน" class="w-full p-3 border border-slate-300 rounded-lg" value="password123"></div><button onclick="login()" class="mt-8 w-full btn-gradient text-white font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg">เข้าสู่ระบบ</button></div>

        <div id="main-app-wrapper" class="h-full flex-col hidden">
            <header id="home-header" class="bg-white/80 backdrop-blur-sm p-4 border-b border-slate-200 flex items-center justify-between sticky top-0 z-20 hidden"><img src="https://placehold.co/120x40/FAFAFA/CCCCCC?text=LOGO" alt="Yanmar Logo" class="h-8"><img onclick="goToPage('page-settings')" src="https://i.pravatar.cc/40?img=12" alt="Profile" class="w-10 h-10 rounded-full cursor-pointer hover:ring-2 hover:ring-red-500 transition-all"></header>
            <header id="main-header" class="bg-white/80 backdrop-blur-sm p-4 border-b border-slate-200 flex items-center sticky top-0 z-20 hidden"><button id="back-button" onclick="goBack()" class="hidden mr-2 p-2 -ml-2 rounded-full hover:bg-slate-100"><i data-lucide="arrow-left" class="w-6 h-6 text-slate-700"></i></button><div class="flex-grow"><h1 id="header-title" class="text-lg font-bold text-slate-800"></h1></div><img onclick="goToPage('page-settings')" src="https://i.pravatar.cc/40?img=12" alt="Profile" class="w-10 h-10 rounded-full cursor-pointer hover:ring-2 hover:ring-red-500 transition-all"></header>

            <main id="main-content" class="flex-grow overflow-y-auto p-5 pb-24">
                <div id="page-home" class="page"></div>
                <div id="page-location" class="page"></div>
                <div id="page-branch" class="page"></div>
                <div id="page-date-vehicle" class="page"></div>
                <div id="page-summary" class="page"></div>
                <div id="page-my-bookings" class="page"></div>
                <div id="page-settings" class="page"></div>
            </main>
            
            <div id="date-vehicle-footer" class="bg-white/90 backdrop-blur-sm p-4 border-t sticky bottom-0 w-full safe-padding-bottom hidden"><div class="flex justify-between items-center mb-2"><span class="font-bold text-slate-600">ราคารวมโดยประมาณ:</span><span id="running-total" class="font-bold text-xl text-slate-800"></span></div><button onclick="confirmDateAndVehicle()" class="w-full btn-gradient text-white font-bold py-3 px-4 rounded-lg shadow-md">ตรวจสอบข้อมูลสรุป</button></div>
            <nav id="bottom-nav" class="bg-white/90 backdrop-blur-sm border-t border-slate-200 sticky bottom-0 w-full safe-padding-bottom shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.05)]"><div class="flex justify-around items-center h-16"><button id="nav-home" onclick="goToPage('page-home', true)" class="text-center text-red-600"><i data-lucide="home" class="w-6 h-6 mx-auto"></i><span class="text-xs font-medium">หน้าหลัก</span></button><button id="nav-bookings" onclick="goToPage('page-my-bookings', true)" class="text-center text-slate-500"><i data-lucide="layout-list" class="w-6 h-6 mx-auto"></i><span class="text-xs font-medium">รายการจอง</span></button></div></nav>
        </div>

        <div id="qr-modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 p-4"><div class="bg-white p-6 rounded-2xl text-center w-full max-w-xs shadow-2xl animate-in fade-in zoom-in-95"><h3 class="text-lg font-bold">สแกนเพื่อชำระเงิน</h3><p id="qr-price" class="font-bold text-2xl mt-4 mb-2"></p><img id="qr-image" src="" alt="QR Code" class="mx-auto rounded-lg"><div class="mt-6 grid grid-cols-2 gap-3"><button id="qr-save-btn" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-700 transition-colors flex items-center justify-center gap-2"><i data-lucide="download" class="w-5 h-5"></i><span>บันทึกรูป</span></button><button id="qr-close-btn" class="w-full bg-slate-200 font-bold py-3 rounded-lg hover:bg-slate-300">ปิด</button></div></div></div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- Application State & Data ---
        let isLoggedIn = false;
        let navigationStack = [];
        let bookingState = {};
        let allBookings = []; 
        const availableAccessories = [ { id: 'plow', name: 'ผานพรวน', price: 500, imageUrl: 'https://placehold.co/100x100/EFEBE9/7D8B98?text=Plow' }, { id: 'bucket', name: 'บุ้งกี๋', price: 400, imageUrl: 'https://placehold.co/100x100/EFEBE9/7D8B98?text=Bucket' }, { id: 'breaker', name: 'หัวเจาะกระแทก', price: 1200, imageUrl: 'https://placehold.co/100x100/EFEBE9/7D8B98?text=Breaker' }, { id: 'mower', name: 'ชุดใบมีดตัดหญ้า', price: 350, imageUrl: 'https://placehold.co/100x100/EFEBE9/7D8B98?text=Mower' } ];
        const tractorPromotions = [ { name: 'โปรฯ สุดคุ้ม! แทรกเตอร์ YM351R', details: 'เช่า 3 วัน ใช้งาน 24 ชั่วโมง', price: 5500, imageUrl: 'https://placehold.co/128x128/FFF3F3/E53935?text=YM351R' }, { name: 'แทรกเตอร์รุ่นใหญ่ YM371A', details: 'กำลังสูง งานเสร็จไว', price: 7200, imageUrl: 'https://placehold.co/128x128/E3F2FD/1E88E5?text=YM371A' }, { name: 'แทรกเตอร์อเนกประสงค์ Solis 26', details: 'คล่องตัว ทุกงานสวน', price: 4800, imageUrl: 'https://placehold.co/128x128/E8F5E9/43A047?text=Solis+26' } ];
        const pageConfig = { 'page-home': { title: 'หน้าหลัก', nav: 'home' }, 'page-location': { title: 'ระบุตำแหน่ง' }, 'page-branch': { title: 'เลือกสาขา' }, 'page-date-vehicle': { title: 'เลือกวันและรถ' }, 'page-summary': { title: 'สรุปรายการ' }, 'page-my-bookings': { title: 'รายการจอง', nav: 'bookings' }, 'page-settings': { title: 'ตั้งค่า' } };

        // --- DOM Elements ---
        const mainAppWrapper = document.getElementById('main-app-wrapper');
        const loginPage = document.getElementById('page-login');
        const homeHeader = document.getElementById('home-header');
        const mainHeader = document.getElementById('main-header');
        const headerTitle = document.getElementById('header-title');
        const backButton = document.getElementById('back-button');
        const mainContent = document.getElementById('main-content');
        let map;
        
        // --- Page Content Templates ---
        const pageTemplates = {
            'page-home': (promos) => { const promotionCards = promos.map(promo => `<div class="bg-white border border-slate-200 rounded-xl shadow-md p-4 transition-all hover:shadow-lg hover:-translate-y-1 cursor-pointer" onclick='selectPromotion(${JSON.stringify({name: promo.name, price: promo.price})})'><div class="flex items-start gap-4"><img src="${promo.imageUrl}" alt="${promo.name}" class="w-16 h-16 rounded-lg object-cover bg-slate-200"><div><h3 class="font-bold text-lg text-slate-800">${promo.name}</h3><p class="text-slate-500 text-sm">${promo.details}</p><p class="text-xl font-bold text-red-600 mt-2">฿${promo.price.toLocaleString()}</p></div></div></div>`).join(''); return `<div class="relative h-40 rounded-xl overflow-hidden mb-8"><img src="https://images.unsplash.com/photo-1621243534229-56cf0cca611a?q=80&w=1770&auto=format&fit=crop" class="w-full h-full object-cover"><div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent p-4 flex flex-col justify-end"><h2 class="text-white text-xl font-bold">เช่าเครื่องจักรยันม่าร์</h2><p class="text-white/90 text-sm">โปรโมชั่นพิเศษรอคุณอยู่</p></div></div><div><h3 class="text-xl font-bold text-slate-800 mb-3">โปรโมชั่นรถไถสำหรับคุณ</h3><div class="space-y-4">${promotionCards}</div></div>`; },
            'page-location': `<input type="text" placeholder="ค้นหา จังหวัด, อำเภอ, ตำบล..." class="w-full p-3 border border-slate-300 rounded-lg mb-4"><div id="map" class="h-64 w-full rounded-lg border border-slate-300 z-10 shadow-inner"></div><p class="text-center text-sm text-slate-500 my-3">ปักหมุดบนแผนที่เพื่อระบุตำแหน่งที่แม่นยำ</p><button onclick="goToPage('page-branch')" class="w-full btn-gradient text-white font-bold py-3 px-4 rounded-lg shadow-md">ยืนยันตำแหน่ง</button>`,
            'page-branch': `<div class="space-y-3" id="branch-list"></div>`,
            // ** UPDATED ** HTML for iOS Fixes
            'page-date-vehicle': `<div class="mb-6"><label class="font-bold text-slate-800 text-base">วันที่ใช้งาน</label><div class="grid grid-cols-2 gap-4 mt-2"><div class="relative flex items-center"><input type="date" id="booking-start-date" onchange="calculatePrice()" class="w-full p-3 border border-slate-300 rounded-lg mt-1"><i data-lucide="calendar" class="absolute right-3 w-5 h-5 text-slate-400 pointer-events-none"></i></div><div class="relative flex items-center"><input type="date" id="booking-end-date" onchange="calculatePrice()" class="w-full p-3 border border-slate-300 rounded-lg mt-1"><i data-lucide="calendar" class="absolute right-3 w-5 h-5 text-slate-400 pointer-events-none"></i></div></div></div><div class="mb-6"><label class="font-bold text-slate-800 text-base">ยืนยันรุ่นรถที่เลือก</label><div id="vehicle-selection" class="mt-2 bg-white p-4 rounded-lg border-2 border-red-100 flex items-center gap-4 shadow-sm"></div></div><div class="mb-6"><label class="font-bold text-slate-800 text-base">เลือกอุปกรณ์เสริม (ถ้ามี)</label><div id="accessory-list" class="mt-2 space-y-3"></div></div>`,
            'page-summary': `<div class="bg-white p-6 rounded-xl border space-y-3"><div><p class="text-sm text-slate-500">โปรโมชั่น</p><p id="summary-promotion" class="font-bold"></p></div><hr><div><p class="text-sm text-slate-500">สาขาที่ให้บริการ</p><p id="summary-branch" class="font-bold"></p></div><hr><div><p class="text-sm text-slate-500">ระยะเวลาใช้งาน (<span id="summary-duration"></span> วัน)</p><p id="summary-date-range" class="font-bold"></p></div><hr><div id="summary-accessories-section" class="hidden"><p class="text-sm text-slate-500">อุปกรณ์เสริม</p><ul id="summary-accessories-list" class="list-disc list-inside text-sm text-slate-700"></ul></div><hr id="summary-accessories-hr" class="hidden"><div class="flex justify-between items-center pt-2"><p class="font-bold text-lg">ยอดรวมสุทธิ</p><p id="summary-price" class="font-bold text-2xl text-red-600"></p></div></div><div class="mt-6 space-y-2"><p class="font-bold">อัปโหลดเอกสาร</p><input type="file" class="file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-600 hover:file:bg-red-100"/><input type="file" class="file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-600 hover:file:bg-red-100"/></div><button onclick="confirmAndPay()" class="mt-6 w-full btn-gradient text-white font-bold py-3 px-4 rounded-lg shadow-md">ยืนยันและชำระเงิน</button>`,
            'page-my-bookings': `<div id="dashboard-summary" class="grid grid-cols-2 gap-4 mb-8"></div><h3 class="font-bold text-slate-800 mb-4">ประวัติการจองล่าสุด</h3><div id="booking-history-list" class="space-y-4"></div>`,
            'page-settings': `<div class="flex flex-col items-center mb-8"><img src="https://i.pravatar.cc/80?img=12" alt="Profile" class="rounded-full w-20 h-20 mb-4"><h2 class="text-xl font-bold">เพื่อนเกษตรกร</h2><p class="text-slate-500">user.yanmar@example.com</p></div><div class="space-y-6"><div><h3 class="font-bold px-1 mb-2">จัดการโปรไฟล์</h3><div class="bg-white rounded-xl p-4 space-y-4"><div><label class="text-sm">ชื่อ-สกุล</label><input type="text" class="w-full bg-slate-50 p-2 rounded-md mt-1" value="เพื่อนเกษตรกร"></div><div><label class="text-sm">เบอร์โทรศัพท์</label><input type="tel" class="w-full bg-slate-50 p-2 rounded-md mt-1" value="081-234-5678"></div></div></div><div><h3 class="font-bold px-1 mb-2">การตั้งค่า</h3><div class="bg-white rounded-xl p-4"><div class="flex justify-between items-center"><p>การแจ้งเตือนโปรโมชั่น</p><div class="relative inline-block w-10 mr-2 align-middle"><input type="checkbox" id="toggle" class="appearance-none cursor-pointer toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4" checked/><label for="toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer"></label></div></div></div></div><div class="pt-4"><button onclick="logout()" class="w-full bg-red-100 text-red-600 font-bold py-3 rounded-lg hover:bg-red-200">ออกจากระบบ</button></div></div>`
        };

        // --- Core App Logic (Unchanged) ---
        window.login = () => { isLoggedIn = true; loginPage.classList.add('hidden'); mainAppWrapper.classList.remove('hidden'); mainAppWrapper.classList.add('flex'); goToPage('page-home', true); };
        window.logout = () => { if (confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) { isLoggedIn = false; mainAppWrapper.classList.add('hidden'); loginPage.classList.remove('hidden'); loginPage.classList.add('flex'); navigationStack = []; resetBookingState(); allBookings = []; } };
        window.goToPage = (pageId, isRoot = false) => { if (!isLoggedIn) return; if (isRoot) { navigationStack = [pageId]; } else if (navigationStack[navigationStack.length - 1] !== pageId) { navigationStack.push(pageId); } renderPage(pageId); };
        window.goBack = () => { if (navigationStack.length > 1) { navigationStack.pop(); renderPage(navigationStack[navigationStack.length - 1]); } };
        const renderPage = (pageId) => {
            const targetPage = document.getElementById(pageId);
            if (!targetPage) return;
            if (targetPage.innerHTML.trim() === '') {
                if (pageId === 'page-home') { targetPage.innerHTML = pageTemplates[pageId](tractorPromotions); }
                else { targetPage.innerHTML = pageTemplates[pageId] || ''; }
            }
            const config = pageConfig[pageId] || {};
            document.querySelectorAll('#main-app-wrapper .page').forEach(p => p.classList.remove('active'));
            targetPage.classList.add('active');
            const isHomePage = pageId === 'page-home';
            homeHeader.classList.toggle('hidden', !isHomePage);
            homeHeader.classList.toggle('flex', isHomePage);
            mainHeader.classList.toggle('hidden', isHomePage);
            mainHeader.classList.toggle('flex', !isHomePage);
            headerTitle.textContent = config.title || 'Yanmar';
            backButton.classList.toggle('hidden', navigationStack.length <= 1);
            const dateVehicleFooter = document.getElementById('date-vehicle-footer');
            const bottomNav = document.getElementById('bottom-nav');
            bottomNav.classList.toggle('hidden', pageId === 'page-date-vehicle');
            dateVehicleFooter.classList.toggle('hidden', pageId !== 'page-date-vehicle');
            ['home', 'bookings'].forEach(navId => document.getElementById(`nav-${navId}`).className = `text-center transition-colors ${config.nav === navId ? 'text-red-600' : 'text-slate-500'}`);
            mainContent.scrollTop = 0;
            const setupFunctions = { 'page-location': () => {if (!map) initializeMap()}, 'page-branch': renderBranchList, 'page-date-vehicle': renderDateVehiclePage, 'page-summary': renderSummary, 'page-my-bookings': renderMyBookingsDashboard };
            setupFunctions[pageId]?.();
            lucide.createIcons();
        };
        const resetBookingState = () => { bookingState = { promotion: null, basePrice: 0, finalPrice: 0, branch: null, startDate: null, endDate: null, accessories: [], duration: 1 }; };
        window.selectPromotion = (promo) => { resetBookingState(); bookingState.promotion = promo.name; bookingState.basePrice = promo.price; bookingState.finalPrice = promo.price; goToPage('page-location'); };
        window.selectBranch = (branchName) => { bookingState.branch = branchName; goToPage('page-date-vehicle'); };
        window.toggleAccessory = (id, price, checkbox) => { const idx = bookingState.accessories.findIndex(a => a.id === id); if (checkbox.checked && idx === -1) { bookingState.accessories.push(availableAccessories.find(a => a.id === id)); } else if (!checkbox.checked && idx > -1) { bookingState.accessories.splice(idx, 1); } calculatePrice(); };
        const calculatePrice = () => { const startDate = new Date(document.getElementById('booking-start-date').value); const endDate = new Date(document.getElementById('booking-end-date').value); let duration = 1; if (startDate && endDate && endDate >= startDate) { duration = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1; } bookingState.duration = duration; const totalAccessoryPrice = bookingState.accessories.reduce((sum, acc) => sum + acc.price, 0); bookingState.finalPrice = bookingState.basePrice + (totalAccessoryPrice * duration); document.getElementById('running-total').textContent = `฿${bookingState.finalPrice.toLocaleString()}`; };
        window.confirmDateAndVehicle = () => { const startDateInput = document.getElementById('booking-start-date'); const endDateInput = document.getElementById('booking-end-date'); if (!startDateInput.value || !endDateInput.value) { alert('กรุณาเลือกวันเริ่มต้นและสิ้นสุด'); return; } if (new Date(endDateInput.value) < new Date(startDateInput.value)) { alert('วันที่สิ้นสุดต้องไม่ก่อนวันเริ่มต้น'); return; } bookingState.startDate = startDateInput.value; bookingState.endDate = endDateInput.value; goToPage('page-summary'); };
        window.confirmAndPay = () => { const newBooking = { id: `YNMR-${Math.floor(1000 + Math.random() * 9000)}`, name: bookingState.promotion, price: bookingState.finalPrice, status: 'Pending', accessories: bookingState.accessories }; allBookings.unshift(newBooking); showQrModal(false, newBooking.price); };
        
        // --- Specific Page Renderers ---
        const renderDateVehiclePage = () => {
            const startDateInput = document.getElementById('booking-start-date');
            const endDateInput = document.getElementById('booking-end-date');
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            startDateInput.value = today.toISOString().split('T')[0];
            endDateInput.value = tomorrow.toISOString().split('T')[0];
            document.getElementById('vehicle-selection').innerHTML = `<img src="https://placehold.co/128x128/FFF3F3/E53935?text=Tractor" alt="Tractor" class="w-16 h-16 rounded-lg object-cover bg-slate-200"><div><h4 class="font-bold text-slate-800">${bookingState.promotion}</h4><p class="text-sm text-slate-500">ราคาเหมา: ฿${bookingState.basePrice.toLocaleString()}</p></div>`;
            // ** UPDATED ** Uses the new custom-checkbox class
            document.getElementById('accessory-list').innerHTML = availableAccessories.map(acc => `<label class="flex items-center justify-between bg-white border rounded-xl p-4 cursor-pointer hover:border-red-400"><div class="flex items-center gap-4"><img src="${acc.imageUrl}" alt="${acc.name}" class="w-10 h-10 rounded-lg object-cover bg-slate-200"><div><h4 class="font-bold text-slate-800">${acc.name}</h4><p class="text-sm text-slate-500">+ ฿${acc.price.toLocaleString()} / วัน</p></div></div><input type="checkbox" onchange="toggleAccessory('${acc.id}', ${acc.price}, this)" class="custom-checkbox"></label>`).join('');
            calculatePrice();
        };
        const renderSummary = () => { const formatDate = (dateString) => new Date(dateString).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' }); document.getElementById('summary-promotion').textContent = bookingState.promotion; document.getElementById('summary-branch').textContent = bookingState.branch || '-'; document.getElementById('summary-duration').textContent = bookingState.duration; document.getElementById('summary-date-range').textContent = `${formatDate(bookingState.startDate)} - ${formatDate(bookingState.endDate)}`; const accSection = document.getElementById('summary-accessories-section'); const accList = document.getElementById('summary-accessories-list'); const accHr = document.getElementById('summary-accessories-hr'); if (bookingState.accessories.length > 0) { accList.innerHTML = bookingState.accessories.map(a => `<li>${a.name}</li>`).join(''); accSection.classList.remove('hidden'); accHr.classList.remove('hidden'); } else { accSection.classList.add('hidden'); accHr.classList.add('hidden'); } document.getElementById('summary-price').textContent = `฿${bookingState.finalPrice.toLocaleString()}`; };
        const renderMyBookingsDashboard = () => { const summary = allBookings.reduce((acc, b) => { acc[b.status] = (acc[b.status] || 0) + 1; return acc; }, {}); document.getElementById('dashboard-summary').innerHTML = `<div class="bg-white p-4 rounded-xl border"><i data-lucide="wallet-cards" class="w-7 h-7 text-orange-500 mb-2"></i><p class="text-2xl font-bold">${summary.Pending || 0}</p><p class="text-sm">รอชำระเงิน</p></div><div class="bg-white p-4 rounded-xl border"><i data-lucide="check-check" class="w-7 h-7 text-green-500 mb-2"></i><p class="text-2xl font-bold">${summary.Completed || 0}</p><p class="text-sm">เสร็จสิ้น</p></div>`; const historyListEl = document.getElementById('booking-history-list'); if (allBookings.length === 0) { historyListEl.innerHTML = `<div class="text-center py-12"><i data-lucide="inbox" class="w-16 h-16 mx-auto text-slate-300"></i><h3 class="mt-4 font-bold text-slate-600">ไม่มีรายการจอง</h3><p class="text-sm text-slate-400">เริ่มต้นการจองแรกของคุณได้เลย</p><button onclick="goToPage('page-home', true)" class="mt-4 text-red-500 font-bold">เริ่มจองเลย</button></div>`; } else { historyListEl.innerHTML = allBookings.map(b => `<div class="bg-white p-4 rounded-xl border-l-4 border-${b.status === 'Pending' ? 'orange' : 'green'}-400 shadow-sm"><div class="flex justify-between"><div><p class="text-xs text-slate-400">${b.id}</p><h3 class="font-bold mt-1">${b.name}</h3><p class="text-sm">ยอด: <span class="font-semibold">฿${b.price.toLocaleString()}</span></p></div><span class="text-sm font-semibold text-${b.status === 'Pending' ? 'orange' : 'green'}-600">${b.status === 'Pending' ? 'รอชำระเงิน' : 'เสร็จสิ้น'}</span></div>${b.status === 'Pending' ? `<button class="show-qr-btn mt-4 w-full text-sm bg-orange-100 text-orange-700 font-bold py-2 rounded-lg" data-price="${b.price}">แสดง QR Code</button>` : ''}</div>`).join(''); } historyListEl.querySelectorAll('.show-qr-btn').forEach(btn => btn.addEventListener('click', (event) => { const price = parseFloat(event.currentTarget.dataset.price); showQrModal(true, price); })); };
        const renderBranchList = () => { document.getElementById('branch-list').innerHTML = [ { name: 'ยันม่าร์ สาขานครปฐม', distance: 15.2 }, { name: 'ยันม่าร์ สาขาราชบุรี', distance: 25.8 } ].map(b => `<div class="bg-white border rounded-xl p-4 cursor-pointer hover:bg-red-50" onclick="selectBranch('${b.name}')"><h3 class="font-bold">${b.name}</h3><p class="text-sm text-slate-500">ระยะทาง: ${b.distance} กม.</p></div>`).join(''); };
        
        // --- Utilities (Map & Modal) ---
        const initializeMap = () => { if(!map) { map = L.map('map').setView([13.7563, 100.5018], 12); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); L.marker([13.7563, 100.5018], {draggable: true}).addTo(map); } };
        const saveQrCode = async (imageUrl) => { try { const response = await fetch(imageUrl); const blob = await response.blob(); const url = window.URL.createObjectURL(blob); const a = document.createElement('a'); a.style.display = 'none'; a.href = url; a.download = `yanmar-payment-qr.png`; document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); a.remove(); } catch (error) { console.error('Error downloading QR Code:', error); alert('ไม่สามารถบันทึกรูปได้'); } };
        const showQrModal = (isFromHistory, price) => { if (typeof price !== 'number' || isNaN(price)) { alert("เกิดข้อผิดพลาดในการแสดง QR Code"); return; } const modal = document.getElementById('qr-modal'); const qrImage = document.getElementById('qr-image'); const qrSaveBtn = document.getElementById('qr-save-btn'); qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://promptpay.io/0812345678/${price}`; document.getElementById('qr-price').textContent = `฿${price.toLocaleString()}`; document.getElementById('qr-close-btn').onclick = hideQrModal; qrSaveBtn.onclick = () => saveQrCode(qrImage.src); if (!isFromHistory) { document.getElementById('qr-close-btn').onclick = () => { hideQrModal(); goToPage('page-my-bookings', true); }; } modal.classList.add('flex'); modal.classList.remove('hidden'); lucide.createIcons(); };
        const hideQrModal = () => { document.getElementById('qr-modal').classList.add('hidden'); };

        // --- Initialization ---
        resetBookingState();
        loginPage.classList.remove('hidden');
        loginPage.classList.add('flex');
    });
    </script>
</body>
</html>
